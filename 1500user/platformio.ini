; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared base. Default env = dev (full debug log). For release build, run:
;   pio run -e prod
[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
board_build.filesystem = littlefs
lib_ldf_mode = deep+
lib_deps =
	SPI
	Wire
	adafruit/RTClib@^2.1.4
	adafruit/Adafruit Fingerprint Sensor Library@^2.1.4
	siara-cc/Sqlite3Esp32@^2.5
	olikraus/U8g2@^2.36.18
	ricmoo/QRCode@^0.0.1
lib_ignore = SoftwareSerial

; Dev env — IN password/WiFi/GAS URL ra Serial để debug.
[env:esp32doit-devkit-v1]
build_flags = -DDEV_BUILD=1

; Prod env — strip SECURE_LOG: không leak credentials qua UART.
[env:prod]
build_flags =